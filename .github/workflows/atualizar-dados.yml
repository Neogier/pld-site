name: Atualizar dados CCEE

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

jobs:
  atualizar-json:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Atualizar dados.json
        run: |
          python atualizar_dados.py

      - name: Commitar dados.json se houve alteracao
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add dados.json

          if git diff --cached --quiet; then
            echo "Nenhuma alteracao em dados.json"
          else
            git commit -m "Atualiza dados.json automaticamente"
            git push
          fi